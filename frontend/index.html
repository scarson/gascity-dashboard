<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gas city · ds-research</title>
    <link rel="icon" href="data:," />
    <script>
      // Avoid FOUC: set data-theme before paint when the operator has
      // pinned a choice. With no pinned choice, prefers-color-scheme
      // drives the initial paint via CSS media query.
      (function () {
        try {
          var pinned = localStorage.getItem('gascity:theme');
          if (pinned === 'dark' || pinned === 'light') {
            document.documentElement.setAttribute('data-theme', pinned);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
